<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetainFlow | AI Customer Retention</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <span>RetainFlow</span>
            </div>
            <nav>
                <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/customers" class="nav-link {% if request.url.path == '/customers' %}active{% endif %}">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="/segments" class="nav-link {% if request.url.path == '/segments' %}active{% endif %}">
                    <i class="fas fa-chart-pie"></i>
                    <span>Segments</span>
                </a>
                <a href="/retention" class="nav-link {% if request.url.path == '/retention' %}active{% endif %}">
                    <i class="fas fa-hand-holding-heart"></i>
                    <span>Retention</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
